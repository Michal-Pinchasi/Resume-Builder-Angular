<main class="main-layout">
  <div class="container">
    <header>
      <h1>מערכת ליצירת קורות חיים (CV Builder)</h1>
      <p>עצבו את העתיד המקצועי שלכם בקלות ובמהירות</p>
    </header>

    <div class="content-grid">
      
      <aside class="forms-side">
        <section class="step-section">
          <app-personal-details (update)="updatePersonal($event)"></app-personal-details>
        </section>

        <section class="step-section">
          <app-education (update)="updateEducation($event)"></app-education>
        </section>
      </aside>

      <main class="preview-side">
        <app-cv-preview [data]="cvData"></app-cv-preview>
      </main>

    </div>
  </div>
</main>

<router-outlet />
